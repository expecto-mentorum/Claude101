title: "Claude Code 101"
description: "A hands-on course teaching DevOps, SRE, QA, and developers to use Claude Code in daily workflows"
url: "https://exitstatus0.github.io"
baseurl: "/Claude101"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

defaults:
  - scope:
      path: "course/block-*"
    values:
      layout: block
  - scope:
      path: ""
    values:
      layout: default

plugins:
  - jekyll-optional-front-matter
  - jekyll-relative-links
  - jekyll-titles-from-headings

exclude:
  - Gemfile.lock
  - README.md
  - LICENSE
  - CLAUDE.md
  - .claude/
  - "*.plan.md"

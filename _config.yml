title: "Claude Code 101"
description: "A hands-on course teaching DevOps, SRE, QA, and developers to use Claude Code in daily workflows"
url: "https://expecto-mentorum.github.io"
baseurl: "/Claude101"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

defaults:
  # English course blocks
  - scope:
      path: "course/block-*"
    values:
      layout: block
      locale: en
  # Russian course blocks
  - scope:
      path: "other/course/block-*"
    values:
      layout: block
      locale: ru
  # Russian pages
  - scope:
      path: "other"
    values:
      locale: ru
  # Ukrainian course blocks
  - scope:
      path: "ua/course/block-*"
    values:
      layout: block
      locale: uk
  # Ukrainian pages
  - scope:
      path: "ua"
    values:
      locale: uk
  # English default
  - scope:
      path: ""
    values:
      layout: default
      locale: en

plugins:
  - jekyll-optional-front-matter
  - jekyll-relative-links
  - jekyll-titles-from-headings

exclude:
  - Gemfile.lock
  - README.md
  - LICENSE
  - CLAUDE.md
  - .claude/
  - "*.plan.md"
  - vendor/
  - docs/
